<div class="bg-white min-h-screen flex items-center justify-center">
  <!-- Register Card -->
  <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
    <!-- Heading -->
    <h2 class="text-3xl font-bold text-gray-800 text-center mb-2">Create Account</h2>
    <p class="text-gray-500 text-center mb-8">Please fill in the details to register</p>

    <!-- Form -->
    <form (ngSubmit)="onSubmit($event)" class="space-y-6">
      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2"> Username </label>
        <input
          type="text"
          [formField]="registerForm.username"
          placeholder="Enter your username"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-300"
        />
        <app-form-errors [control]="registerForm.username()"></app-form-errors>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2"> Email </label>
        <input
          type="email"
          [formField]="registerForm.email"
          placeholder="Enter your email"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-300"
        />
        <app-form-errors [control]="registerForm.email()"></app-form-errors>
      </div>

      <!-- Password -->
      <div class="relative">
        <label class="block text-sm font-medium text-gray-700 mb-2"> Password </label>
        <input
          id="password"
          type="password"
          [formField]="registerForm.password"
          placeholder="Enter your password"
          class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-300"
        />
        <app-form-errors [control]="registerForm.password()"></app-form-errors>
      </div>

      <!-- Confirm Password -->
      <div class="relative">
        <label class="block text-sm font-medium text-gray-700 mb-2"> Confirm Password </label>
        <input
          id="confirmPassword"
          type="password"
          [formField]="registerForm.confirmPassword"
          placeholder="Confirm your password"
          class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-300"
        />
        <app-form-errors [control]="registerForm.confirmPassword()"></app-form-errors>
      </div>

      <!-- Register Button -->
      <button
        type="submit"
        appButton
        [disabled]="registerForm().invalid() || isLoading$()"
        class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 active:scale-95 transition duration-200 shadow-md hover:shadow-lg"
      >
        {{ isLoading$() ? 'Registering...' : 'Register' }}
      </button>
    </form>

    <!-- Login Section -->
    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a
        routerLink="/login"
        class="text-blue-600 font-medium hover:underline hover:text-blue-700 transition"
      >
        Sign in here
      </a>
    </p>
  </div>
</div>
